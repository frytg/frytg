<!doctype html>
<html
	class="bg-mid-dark-greeny text-white font-sans selection:bg-yellow selection:text-greeny"
	lang="{{ or site.Language.Locale site.Language.Name }}"
	dir="{{ or site.Language.Direction `ltr` }}"
>
	{{ partial "html/head/head.html" . }}
	<body>
		<header class="site-header">{{ partial "navigation.html" . }}</header>
		<main>{{ block "main" . }}{{ end }}</main>
		<footer class="site-footer">{{ partial "html/footer.html" . }}</footer>
	</body>
</html>
